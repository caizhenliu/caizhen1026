<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BabylonJS Viewer - Model Select</title>
    
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    
    <style>
        :root {
            --bg-color: #FFF8E1;      /* 鵝黃色背景 */
            --primary-pink: #FFEbee;  /* 淺粉色 */
            --border-pink: #F8BBD0;   /* 邊框粉色 */
            --text-brown: #5D4037;    /* 深褐色文字 */
            --accent-pink: #F06292;   /* 點綴深粉色 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-brown);
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* 選單容器樣式 */
        .controls {
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        /* 美化下拉選單 */
        select {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            color: var(--text-brown);
            background-color: var(--primary-pink);
            border: 2px solid var(--border-pink);
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            appearance: none; /* 去除原生箭頭 */
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23880E4F%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }

        select:hover {
            border-color: var(--accent-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(240, 98, 146, 0.2);
        }

        /* 3D 視窗容器 */
        .viewerContainer {
            width: 100%;
            max-width: 400px;
            height: 500px;
            background: white;
            border: 4px solid var(--primary-pink);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            image-rendering: pixelated;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 底部返回連結 */
        .footer-link {
            margin-top: 30px;
            text-decoration: none;
            color: var(--accent-pink);
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .footer-link:hover {
            border-bottom: 1px solid var(--accent-pink);
        }
    </style>

    <script>
        function loadit(modelUrl) {
            if(modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                if (viewer) {
                    viewer.loadModel(modelUrl);
                }
            }
        }
    </script>
</head>
<body>

    <h1>Model Selection</h1>

    <div class="controls">
        <select onchange="loadit(this.value)">
            <option value="">請選擇模型 (Select Model)</option>
            <option value="./models/alice.glb">Alice</option>
            <option value="./models/Astronaut.glb">Astronaut</option>
            <option value="./models/stacy_lightweight.glb">Stacy</option>
            <option value="./models/cac-1774683464835.glb">caizhen</option>
        </select>
    </div>

    <div class='viewerContainer'>
        <babylon id="viewerID" extends="minimal"></babylon>
    </div>

    <a href="index.html" class="footer-link">← 返回導覽頁面</a>

</body>
</html>

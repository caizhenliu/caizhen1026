<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BabylonJS Viewer - Fixed Style</title>
    
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    
    <style>
        /* 基礎背景：鵝黃色 */
        body {
            background-color: #FFF8E1;
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
            min-height: 100vh;
        }

        /* 下拉選單：粉色方框 */
        select {
            width: 400px;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #FFEbee; /* 淺粉色 */
            border: 2px solid #F8BBD0; /* 粉色邊框 */
            border-radius: 8px;
            color: #880E4F;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        select:hover {
            background-color: #F8BBD0;
            color: white;
        }

        /* 3D 視窗容器：維持 400x500 */
        .viewerContainer {
            width: 400px;
            height: 500px;
            border: 5px solid #FFEbee; /* 粉色外框 */
            border-radius: 15px;
            overflow: hidden;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            image-rendering: pixelated; 
        }

        /* 確保 babylon 標籤填滿容器 */
        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 新增：底部返回連結樣式 */
        .back-nav {
            margin-top: 30px;
            text-decoration: none;
            color: #F06292;
            font-size: 0.9rem;
            padding: 8px 16px;
            border: 1px solid #F8BBD0;
            border-radius: 20px;
            transition: 0.3s;
        }

        .back-nav:hover {
            background-color: #FFEbee;
        }
    </style>

    <script>
        function loadit(modelUrl) {
            if(modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                viewer.loadModel(modelUrl);
            }
        }
    </script>
</head>
<body>

    <select onchange="loadit(this.value)">
        <option value="">select model</option>
        <option value="./models/alice.glb">Alice</option>
        <option value="./models/Astronaut.glb">Astronaut</option>
        <option value="./models/stacy_lightweight.glb">Stacy</option>
        <option value="./models/cac-1774683464835.glb">caizhen</option>
    </select>

    <div class='viewerContainer'>
        <babylon id="viewerID"></babylon>
    </div>

    <a href="index.html" class="back-nav">← Back to Menu</a>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BabylonJS Viewer - NavBar Custom</title>
    
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    
    <style>
        /* 1. 設定背景顏色為鵝黃色 */
        body {
            background-color: #FFF8E1;
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            min-height: 100vh;
        }

        /* 2. 美化下拉選單為粉色方框 */
        select {
            width: 400px;
            padding: 12px 20px;
            margin-bottom: 25px;
            background-color: #FFEbee; /* 淺粉色 */
            border: 2px solid #F8BBD0; /* 粉色邊框 */
            border-radius: 12px;
            color: #880E4F;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }

        select:hover {
            border-color: #F06292;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(240, 98, 146, 0.2);
        }

        /* 3. 3D 視窗容器：維持 400x500 */
        .viewerContainer {
            width: 400px;
            height: 500px;
            background: white;
            border: 6px solid #FFEbee; /* 粉色粗邊框 */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            image-rendering: pixelated; /* 保持你原本的設定 */
        }

        /* 確保 babylon 標籤填滿容器 */
        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 底部返回連結 */
        .back-nav {
            margin-top: 30px;
            text-decoration: none;
            color: #F06292;
            font-size: 0.9rem;
            padding: 8px 16px;
            border: 1px solid #F8BBD0;
            border-radius: 20px;
            transition: 0.3s;
        }

        .back-nav:hover {
            background-color: #FFEbee;
        }
    </style>

    <script>
        // 完全保留你原本更新 NavBar 與 VR 設定的邏輯
        function loadit(modelUrl) {
            if(modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                let temp = viewer.templateManager.getTemplate('navBar');
                let param = temp._configuration;
                
                // 維持你的 NavBar 參數設定
                param.params.hideVr = false;
                param.params.disableOnFullscreen = true;
                
                temp.updateParams(param);
                viewer.loadModel(modelUrl);
            }
        }
    </script>
</head>
<body>

    <select onchange="loadit(this.value)">
        <option value="">select model (NavBar Settings)</option>
        <option value="./models/alice.glb">Alice</option>
        <option value="./models/Astronaut.glb">Astronaut</option>
        <option value="./models/buddha.glb">Buddha</option>
    </select>

    <div class='viewerContainer'>
        <babylon id="viewerID">
            <vr></vr> </babylon>
    </div>

    <a href="index.html" class="back-nav">← Back to Menu</a>

</body>
</html>

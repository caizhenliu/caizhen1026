<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BabylonJS Viewer - NavBar Custom</title>
    
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    
    <style>
        body {
            background-color: #FFF8E1;
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            min-height: 100vh;
        }

        select {
            width: 400px;
            padding: 12px 20px;
            margin-bottom: 25px;
            background-color: #FFEbee; 
            border: 2px solid #F8BBD0; 
            border-radius: 12px;
            color: #880E4F;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }

        select:hover {
            border-color: #F06292;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(240, 98, 146, 0.2);
        }

        .viewerContainer {
            width: 400px;
            height: 500px;
            background: white;
            border: 6px solid #FFEbee; 
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }

        .back-nav {
            margin-top: 30px;
            text-decoration: none;
            color: #F06292;
            font-size: 0.9rem;
            padding: 8px 16px;
            border: 1px solid #F8BBD0;
            border-radius: 20px;
            transition: 0.3s;
        }

        .back-nav:hover {
            background-color: #FFEbee;
        }
    </style>

    <script>
        function loadit(modelUrl) {
            if(modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                let temp = viewer.templateManager.getTemplate('navBar');
                let param = temp._configuration;
                
                param.params.hideVr = false;
                param.params.disableOnFullscreen = true;
                
                temp.updateParams(param);
                viewer.loadModel(modelUrl);
            }
        }
    </script>
</head>
<body>

    <select onchange="loadit(this.value)">
        <option value="">select model (NavBar Settings)</option>
        <option value="./models/alice.glb">Alice</option>
        <option value="./models/Astronaut.glb">Astronaut</option>
        <option value="./models/buddha.glb">Buddha</option>
        <option value="./models/cac-1776925943472.glb">caizhenhw</option>
    </select>

    <div class='viewerContainer'>
        <babylon id="viewerID">
            <vr></vr> 
        </babylon>
    </div>

    <a href="index.html" class="back-nav">← Back to Menu</a>

</body>
</html>

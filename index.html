<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Project Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a; /* 深色背景更顯 3D 專業感 */
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding: 40px 0;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #f8fafc;
        }

        .profile-link {
            display: inline-block;
            margin-bottom: 40px;
            padding: 10px 25px;
            background: var(--primary-gradient);
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .profile-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: #667eea;
        }

        .card i {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #a5b4fc;
        }

        .card span {
            font-size: 1.1rem;
            font-weight: 500;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        hr {
            width: 50px;
            border: 1px solid #475569;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello MyFriend</h1>
        
        <a href="sketchfab.html" class="profile-link">
            <i class="fa-solid fa-user-astronaut"></i> About Me
        </a>

        <hr>

        <div class="grid">
            <a href="0.babylonViewer Basic.html" class="card">
                <i class="fa-solid fa-cube"></i>
                <span>Babylon Basic</span>
            </a>

            <a href="1.babylonViewer Select.html" class="card">
                <i class="fa-solid fa-hand-pointer"></i>
                <span>Viewer Select</span>
            </a>

            <a href="2.babylonViewer Navbar.html" class="card">
                <i class="fa-solid fa-bars"></i>
                <span>Viewer Navbar</span>
            </a>

            <a href="./webAR" class="card" style="opacity: 0.8;">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <span>WebAR Demo</span>
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 Crafted with Unity & Babylon.js
    </footer>

</body>
</html>

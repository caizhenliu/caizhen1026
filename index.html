<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hub</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #007AFF; /* 經典科技藍 */
            --line-color: #eeeeee;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 350px;
            padding: 20px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        hr {
            border: 0;
            height: 1px;
            background-color: var(--line-color);
            margin: 24px 0;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 4px; /* 連結之間的微小間距 */
        }

        a {
            display: block;
            text-decoration: none;
            color: var(--accent-color);
            font-size: 1.05rem;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
            margin-left: -16px; /* 讓懸停背景對齊文字起始位置 */
        }

        /* 懸停效果：優雅的灰色底層 */
        a:hover {
            background-color: #f5f5f7;
            color: #0056b3;
            transform: translateX(5px); /* 輕微右移增加動態感 */
        }

        /* 讓 meeeee 稍微有點獨特性 */
        .me-link {
            font-weight: 500;
            color: var(--text-primary);
        }

        .me-link:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>hello MyFriend</h1>
        
        <hr/>

        <div class="links-group">
            <a href="sketchfab.html" class="me-link">meeeee</a>
            
            <a href="0.babylonViewer Basic.html">Babylon Viewer Basic</a>
            
            <a href="1.babylonViewer Select.html">Babylon Viewer Select</a>
            
            <a href="2.babylonViewer Navbar.html">Babylon Viewer Navbar</a>
        </div>

        <hr/>
    </div>

</body>
</html>

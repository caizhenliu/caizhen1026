<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caizhen's 3D Model</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFF8E1; /* 鵝黃色背景 */
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .sketchfab-embed-wrapper {
            width: 100%;
            max-width: 650px;
            background-color: white;
            border: 6px solid #FFEbee; /* 淺粉色方框 */
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            text-align: center;
            color: #5D4037;
        }

        /* 名字與連結的容器 */
        .user-info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* 名字與連結的間距 */
            margin-bottom: 10px;
        }

        .user-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #5D4037;
        }

        /* 顯眼的分享連結按鈕 */
        .share-tag {
            text-decoration: none;
            background-color: #F06292; /* 鮮豔的粉紅色 */
            color: white !important;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(240, 98, 146, 0.3);
        }

        .share-tag:hover {
            background-color: #D81B60;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(216, 27, 96, 0.4);
        }

        .model-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 15px 0;
            display: block;
        }

        hr {
            border: 0;
            height: 1px;
            background-color: #F8BBD0;
            margin: 20px 0;
        }

        .iframe-container {
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #FFEbee;
        }

        .back-nav {
            margin-top: 30px;
            text-decoration: none;
            color: #880E4F;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .back-nav:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="sketchfab-embed-wrapper">
        <div class="user-info-row">
            <span class="user-name">I am caizhen</span>
            <a href="https://skfb.ly/pHQyX" class="share-tag" target="_blank">
                <i class="fa-solid fa-share-nodes"></i> Share with link
            </a>
        </div>

        <span class="model-title">This is my 3D model: meeeee</span>
        
        <hr>

        <div class="iframe-container">
            <iframe 
                style="width:100%; height:480px; display: block;" 
                title="meeeee" 
                frameborder="0" 
                allowfullscreen 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true" 
                allow="autoplay; fullscreen; xr-spatial-tracking" 
                src="https://sketchfab.com/models/f2bc1f306f8c4302ac87faa569ebc64f/embed">
            </iframe>
        </div>
    </div>

    <a href="index.html" class="back-nav">← Back to Menu</a>

</body>
</html>

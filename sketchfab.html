<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caizhen's 3D Model</title>
    <style>
        /* 基礎背景：鵝黃色 */
        body {
            background-color: #FFF8E1;
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .sketchfab-embed-wrapper {
            width: 100%;
            max-width: 600px; /* Sketchfab 建議寬一點比較好操作 */
            background-color: white;
            border: 6px solid #FFEbee; /* 淺粉色方框 */
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            text-align: center;
            color: #5D4037;
        }

        /* 標題樣式 */
        .model-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .user-name {
            font-size: 0.9rem;
            color: #F06292;
            margin-bottom: 20px;
            display: block;
            letter-spacing: 1px;
        }

        /* 分隔線 */
        hr {
            border: 0;
            height: 1px;
            background-color: #F8BBD0;
            margin: 20px 0;
        }

        /* 內嵌模型方框 */
        .iframe-container {
            border-radius: 15px;
            overflow: hidden; /* 確保 iframe 的角也是圓的 */
            border: 1px solid #eeeeee;
        }

        /* 分享連結樣式 */
        .share-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #F06292;
            font-size: 0.85rem;
            padding: 5px 15px;
            border: 1px solid #F8BBD0;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .share-link:hover {
            background-color: #FFEbee;
            transform: scale(1.05);
        }

        /* 返回按鈕 */
        .back-nav {
            margin-top: 30px;
            text-decoration: none;
            color: #880E4F;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .back-nav:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="https://skfb.ly/pHQyX" class="share-link">🔗 share with link</a>

    <div class="sketchfab-embed-wrapper">
        <span class="user-name">I am caizhen</span>
        <span class="model-title">This is my 3D model: meeeee</span>
        
        <hr>

        <div class="iframe-container">
            <iframe 
                style="width:100%; height:480px; display: block;" 
                title="meeeee" 
                frameborder="0" 
                allowfullscreen 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true" 
                allow="autoplay; fullscreen; xr-spatial-tracking" 
                xr-spatial-tracking 
                execution-while-out-of-viewport 
                execution-while-rendered 
                web-share 
                src="https://sketchfab.com/models/f2bc1f306f8c4302ac87faa569ebc64f/embed">
            </iframe>
        </div>
    </div>

    <a href="index.html" class="back-nav">← Back to Menu</a>

</body>
</html>
